# ─────────────────────────────────────────────────────────────────────────────
# Phase 2 — Docker Compose: Full local stack
# Services: MongoDB · Redis · Backend · Frontend
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: ns_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis (ready for Phase 3 — caching & JWT blocklist) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: ns_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (Express + Mongoose) ─────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ns_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Load secrets from the existing .env file (includes Atlas MONGO_URI, JWT_SECRET, ENCRYPTION_KEY)
    env_file:
      - ./Backend/.env
    # Only add vars not already in .env (Atlas MONGO_URI stays from .env)
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3000
      # Match local dev timezone so naive datetime strings are parsed correctly.
      # Without this, Docker (UTC) misinterprets IST datetimes by +5:30 hours.
      TZ: Asia/Kolkata
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (Vite React → Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Browser talks to backend via host port (not docker-internal name)
        VITE_API_BASE_URL: http://localhost:3000
    container_name: ns_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
