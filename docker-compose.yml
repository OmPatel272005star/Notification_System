# ─────────────────────────────────────────────────────────────────────────────
# Phase 5 — Docker Compose: Microservices Architecture
#
# 8 independent Node.js services + Nginx API Gateway + Redis + Kafka (KRaft)
# MongoDB stays on Atlas (cloud) — NOT containerized.
#
# To run Phase 5 microservices:
#   docker compose up --build
#
# To fall back to the Phase 4 monolith (Backend/ folder):
#   docker compose -f docker-compose.monolith.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis (JWT blocklist + user/list cache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ns_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Kafka — KRaft mode (single broker+controller, NO Zookeeper) ─────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ns_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  # ── Kafka UI ─────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ns_kafka_ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # ── API Gateway (Nginx) ───────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: ns_gateway
    restart: unless-stopped
    ports:
      - "3000:80"    # port 3000 so frontend VITE_API_BASE_URL=http://localhost:3000 still works
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - user-service
      - template-service
      - audience-service
      - campaign-service
      - connection-service

  # ── Auth Service (3001) ───────────────────────────────────────────────────
  auth-service:
    build:
      context: ./services
      dockerfile: auth-service/Dockerfile
    container_name: ns_auth
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3001
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── User Service (3002) ───────────────────────────────────────────────────
  user-service:
    build:
      context: ./services
      dockerfile: user-service/Dockerfile
    container_name: ns_user
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Template Service (3003) ───────────────────────────────────────────────
  template-service:
    build:
      context: ./services
      dockerfile: template-service/Dockerfile
    container_name: ns_template
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3003
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Audience Service (3004) ───────────────────────────────────────────────
  audience-service:
    build:
      context: ./services
      dockerfile: audience-service/Dockerfile
    container_name: ns_audience
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Campaign Service (3005) ───────────────────────────────────────────────
  campaign-service:
    build:
      context: ./services
      dockerfile: campaign-service/Dockerfile
    container_name: ns_campaign
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3005
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Connection Service (3006) ─────────────────────────────────────────────
  connection-service:
    build:
      context: ./services
      dockerfile: connection-service/Dockerfile
    container_name: ns_connection
    restart: unless-stopped
    env_file: ./.env
    environment:
      PORT: 3006
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Notification Dispatcher (Kafka consumer daemon) ───────────────────────
  notification-dispatcher:
    build:
      context: ./services
      dockerfile: notification-dispatcher/Dockerfile
    container_name: ns_dispatcher
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      kafka:
        condition: service_healthy

  # ── Scheduler Service (cron daemon) ──────────────────────────────────────
  scheduler-service:
    build:
      context: ./services
      dockerfile: scheduler-service/Dockerfile
    container_name: ns_scheduler
    restart: unless-stopped
    env_file: ./.env
    depends_on:
      kafka:
        condition: service_healthy

  # ── Frontend (Vite React → Nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Gateway is on port 3000 → same URL as before, zero frontend changes needed
        VITE_API_BASE_URL: http://localhost:3000
    container_name: ns_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

  # ── Phase 6 — Observability Stack ────────────────────────────────────────

  # Loki — log storage and query engine
  loki:
    image: grafana/loki:3.0.0
    container_name: ns_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./services/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Promtail — reads Docker container stdout logs → ships to Loki
  promtail:
    image: grafana/promtail:3.0.0
    container_name: ns_promtail
    restart: unless-stopped
    user: root
    volumes:
      - ./services/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml -log.level=warn
    depends_on:
      loki:
        condition: service_healthy

  # Grafana — log visualization dashboard (open http://localhost:9000)
  grafana:
    image: grafana/grafana:11.0.0
    container_name: ns_grafana
    restart: unless-stopped
    ports:
      - "9000:3000"   # open http://localhost:9000 in your browser
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin   # no login needed
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./services/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./services/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy

volumes:
  loki_data:
  grafana_data:
