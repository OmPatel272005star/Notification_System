# ─────────────────────────────────────────────────────────────────────────────
# Phase 5 — Nginx API Gateway
# Routes all browser traffic to the correct upstream microservice.
#
# KEY: location blocks have NO trailing slash so they match both:
#   /campaign         (list endpoint)
#   /campaign/123     (single item)
#   /campaign?page=1  (with query params)
#
# Using Docker's DNS resolver (127.0.0.11) with valid=5s so nginx
# re-resolves container IPs after restarts — avoids stale-IP 502s.
# ─────────────────────────────────────────────────────────────────────────────

server {
  listen 80;
  server_name _;

  # Docker internal DNS — re-resolve every 5s
  resolver 127.0.0.11 valid=5s ipv6=off;
  resolver_timeout 5s;

  # Increase body size for GrapesJS template data & base64 profile pictures
  client_max_body_size 20M;

  # Proxy timeouts
  proxy_connect_timeout  10s;
  proxy_send_timeout     60s;
  proxy_read_timeout     60s;

  # Common proxy headers
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;

  # ── Auth ─────────────────────────────────────────────────────────────────────
  # Matches: /auth/login  /auth/signup  /auth/logout
  location /auth {
    set $svc http://auth-service:3001;
    proxy_pass $svc;
  }

  # ── User ─────────────────────────────────────────────────────────────────────
  # Matches: /user/getBulkUser  /user/:id  /user/add
  location /user {
    set $svc http://user-service:3002;
    proxy_pass $svc;
  }

  # ── Profile ──────────────────────────────────────────────────────────────────
  # Matches: /profile/:id
  location /profile {
    set $svc http://user-service:3002;
    proxy_pass $svc;
  }

  # ── Template ─────────────────────────────────────────────────────────────────
  # Matches: /template  /template/:id  /template/:id/duplicate
  location /template {
    set $svc http://template-service:3003;
    proxy_pass $svc;
  }

  # ── Audience ─────────────────────────────────────────────────────────────────
  # Matches: /audience  /audience/:id  /audience/:id/timeline
  location /audience {
    set $svc http://audience-service:3004;
    proxy_pass $svc;
  }

  # ── Campaign ─────────────────────────────────────────────────────────────────
  # Matches: /campaign?page=1  /campaign/:id  /campaign/:id/publish
  location /campaign {
    set $svc http://campaign-service:3005;
    proxy_pass $svc;
  }

  # ── Connections ───────────────────────────────────────────────────────────────
  # Matches: /connections  /connections/:id  /connections/:id/test
  location /connections {
    set $svc http://connection-service:3006;
    proxy_pass $svc;
  }

  # ── Gateway health ────────────────────────────────────────────────────────────
  location /health {
    add_header Content-Type application/json;
    return 200 '{"status":"gateway-ok","phase":"5"}';
  }
}
