server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 102400
    timeout: 10s

scrape_configs:
  # ── Docker container log discovery ──────────────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Strip leading slash from container name (e.g. /ns_auth → ns_auth)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container

      # Compose service name → service label (used by Winston JSON parser below)
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service

      # Compose project name
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project

      # Drop internal infrastructure containers (keep only our Node.js services + gateway)
      # Comment out the drop rule if you want ALL container logs
      - source_labels: ["container"]
        regex: "ns_(auth|user|template|audience|campaign|connection|dispatcher|scheduler|gateway|frontend|kafka|redis|loki|promtail|grafana|kafka_ui)"
        action: keep

    # ── Pipeline: parse Winston JSON then promote fields to Loki labels ───────
    pipeline_stages:
      # Unwrap Docker json-file log format: {"log":"...\n","stream":"stdout","time":"..."}
      - docker: {}

      # Attempt to parse the log line as Winston structured JSON
      - json:
          expressions:
            log_level:   level
            log_service: service
            log_message: message

      # Promote Winston fields to Loki stream labels for fast filtering
      - labels:
          level:   log_level
          service: log_service

      # Drop empty lines and Docker daemon internal noise
      - drop:
          expression: "^\\s*$"
          drop_counter_reason: empty_line
